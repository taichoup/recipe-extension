<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 280px;
      padding: 16px;
      margin: 0;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #111;
    }
    select {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 12px;
      box-sizing: border-box;
    }
    .buttons {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    #btn-obsidian {
      background: #7c3aed;
      color: white;
    }
    #btn-bring {
      background: #f97316;
      color: white;
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }
    #status.error {
      color: #dc2626;
    }
    #status.success {
      color: #16a34a;
    }
    #no-recipe {
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div id="loading">Chargement…</div>
  <div id="main" style="display:none">
    <h2 id="recipe-name"></h2>
    <select id="subfolder"></select>
    <div class="buttons">
      <button id="btn-obsidian">Obsidian</button>
      <button id="btn-bring">Bring!</button>
    </div>
    <div id="status"></div>
  </div>
  <div id="no-recipe" style="display:none">
    Aucun schema.org/Recipe trouvé sur cette page.
  </div>
  <script src="popup.js"></script>
</body>
</html>
